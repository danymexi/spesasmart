version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gc-postgres
    environment:
      POSTGRES_DB: grocerycompass
      POSTGRES_USER: gc_user
      POSTGRES_PASSWORD: gc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gc_user -d grocerycompass"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gc-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: gc-meilisearch
    environment:
      MEILI_MASTER_KEY: gc_dev_meili_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: gc-api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://gc_user:gc_dev_password@db:5432/grocerycompass
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: gc_dev_meili_key
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - ../apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: gc-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://gc_user:gc_dev_password@db:5432/grocerycompass
      REDIS_URL: redis://redis:6379/0
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: gc_dev_meili_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: celery -A tasks.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: gc-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://gc_user:gc_dev_password@db:5432/grocerycompass
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    command: celery -A tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
  redisdata:
  meilidata:
